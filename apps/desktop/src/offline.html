<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nodera Sistem baglanti bekleniyor</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(15, 23, 42, 0.86), rgba(15, 23, 42, 0.62)),
          radial-gradient(circle at 80% 20%, rgba(45, 212, 191, 0.28), transparent 32%);
        color: #f8fafc;
      }

      .drag-region {
        position: fixed;
        inset: 0 0 auto 0;
        height: 58px;
        -webkit-app-region: drag;
      }

      .window-controls {
        display: none;
      }

      .window-controls button {
        position: relative;
        display: grid;
        place-items: center;
        width: 100%;
        height: 30px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: rgba(255, 255, 255, 0.92);
        cursor: default;
      }

      .window-controls button:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .window-controls button[data-window-action="close"]:hover {
        background: #ef4444;
      }

      .window-icon {
        position: relative;
        display: block;
        width: 16px;
        height: 16px;
      }

      .window-icon--minimize::before {
        content: "";
        position: absolute;
        left: 2px;
        right: 2px;
        top: 10px;
        height: 1.5px;
        border-radius: 999px;
        background: currentColor;
      }

      .window-icon--maximize::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 3px;
        width: 10px;
        height: 10px;
        border: 1.6px solid currentColor;
        border-radius: 2px;
      }

      .window-icon--close::before,
      .window-icon--close::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 7px;
        width: 11px;
        height: 1.6px;
        border-radius: 999px;
        background: currentColor;
      }

      .window-icon--close::before {
        transform: rotate(45deg);
      }

      .window-icon--close::after {
        transform: rotate(-45deg);
      }

      main {
        width: min(520px, calc(100vw - 40px));
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(22px);
        padding: 30px;
        -webkit-app-region: no-drag;
      }

      h1 {
        margin: 0;
        font-size: 26px;
      }

      p {
        color: rgba(248, 250, 252, 0.72);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 8px;
        background: #2dd4bf;
        color: #042f2e;
        font-weight: 800;
        text-decoration: none;
      }

      code {
        color: #99f6e4;
      }
    </style>
  </head>
  <body>
    <div class="drag-region" aria-hidden="true"></div>
    <div class="window-controls" aria-label="Pencere kontrolleri">
      <button type="button" data-window-action="minimize" title="Kucult" aria-label="Kucult">
        <span class="window-icon window-icon--minimize" aria-hidden="true"></span>
      </button>
      <button type="button" data-window-action="maximize" title="Buyut" aria-label="Buyut">
        <span class="window-icon window-icon--maximize" aria-hidden="true"></span>
      </button>
      <button type="button" data-window-action="close" title="Kapat" aria-label="Kapat">
        <span class="window-icon window-icon--close" aria-hidden="true"></span>
      </button>
    </div>
    <main>
      <h1>Nodera Sistem su an acilamadi</h1>
      <p>Internet baglantisi, SSL veya servis erisimi hazir olmayabilir. Lutfen baglantini kontrol edip tekrar dene.</p>
      <p id="detail"></p>
      <a id="retry" href="https://noderasoftware.com/hotel/">Tekrar dene</a>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const url = params.get("url") || "https://noderasoftware.com/hotel/";
      const code = params.get("code") || "unknown";
      const reason = params.get("reason") || "Baglanti kurulamadi";
      document.getElementById("retry").href = url;
      document.getElementById("detail").innerHTML = `Hata: <code>${code}</code> ${reason}`;

      document.querySelector(".window-controls").addEventListener("click", (event) => {
        const button = event.target.closest("[data-window-action]");
        if (!button || !window.hotelOpsDesktopShell) return;
        window.hotelOpsDesktopShell.control(button.dataset.windowAction);
      });
    </script>
  </body>
</html>
