server {
    listen 80;
    listen [::]:80;

    server_name noderasoftware.com www.noderasoftware.com;
    root /opt/noderasoftware/apps/web/out;
    index index.html;
    access_log off;
    sendfile on;
    tcp_nopush on;
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;

    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    add_header Cache-Control "no-cache" always;
    error_page 404 /404/index.html;

    location /api/ {
        add_header Cache-Control "no-store" always;
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        add_header Cache-Control "no-store" always;
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /maintenance-status.json {
        charset utf-8;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /app-version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /web-build.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(?:png|jpg|jpeg|gif|webp|ico|svg)$ {
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    location /downloads/ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location ~ ^/hotel/modules/(inventory|rooms|lost-found|guest-requests|requests|operation-documents|training|minibar|equipment|announcements|vip)(/|$) {
        try_files $uri $uri/ =404;
    }

    location ~ ^/hotel/modules/ {
        try_files $uri $uri/ =404;
    }

    location /hotel/ {
        try_files $uri $uri/ =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
