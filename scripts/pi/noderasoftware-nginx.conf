server {
    listen 80;
    listen [::]:80;

    server_name noderasoftware.com www.noderasoftware.com;
    root /opt/noderasoftware/apps/web/out;
    index index.html;

    client_max_body_size 20m;

    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";

    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/hotel/modules/(inventory|rooms|lost-found|guest-requests|requests|training|minibar|equipment|announcements|vip)(/|$) {
        try_files $uri $uri/ /hotel/index.html;
    }

    location ~ ^/hotel/modules/ {
        return 301 /hotel/dashboard/;
    }

    location /hotel/ {
        try_files $uri $uri/ /hotel/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
