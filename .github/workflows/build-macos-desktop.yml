name: Build macOS Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - ".github/workflows/build-macos-desktop.yml"
      - "apps/desktop/**"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write

jobs:
  build:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-26
          - arch: x64
            runner: macos-26-intel

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check desktop scripts
        run: |
          node --check apps/desktop/src/main.cjs
          node --check apps/desktop/src/preload.cjs
          node --check apps/desktop/src/desktop-inject.js

      - name: Build macOS icon
        run: npm run mac:icon --workspace @hotel-ops/desktop

      - name: Build macOS package
        run: npm run dist:mac:${{ matrix.arch }} --workspace @hotel-ops/desktop

      - name: Upload macOS release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: hotelops-v1
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "HotelOps V1" \
              --notes "Latest unsigned HotelOps application builds." \
              --latest=false || true
          fi

          gh release upload "$RELEASE_TAG" \
            "apps/desktop/release/HotelOps-Mac-V1-${{ matrix.arch }}.dmg" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
